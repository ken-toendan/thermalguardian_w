<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OG card preview — export me as 1200×630 PNG</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700;800&family=Inter:wght@500&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; }
    .card {
      width: 1200px;
      height: 630px;
      background: #f7f5ef;
      color: #11192b;
      padding: 80px;
      font-family: "Inter", sans-serif;
      position: relative;
      box-sizing: border-box;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-family: "DM Sans", sans-serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 0.04em;
    }
    .brand .mark { width: 44px; height: 44px; object-fit: contain; }
    .kicker {
      display: inline-block;
      margin-top: 100px;
      padding: 6px 14px;
      background: #ff751f;
      color: #f7f5ef;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border-radius: 4px;
    }
    h1 {
      font-family: "DM Sans", sans-serif;
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -0.025em;
      line-height: 1.05;
      margin: 24px 0 0 0;
      max-width: 980px;
    }
    .accent { color: #ff751f; }
    .footer-line {
      position: absolute;
      bottom: 60px;
      left: 80px;
      right: 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
      color: rgba(17,25,43,0.6);
      padding-top: 20px;
      border-top: 1px solid rgba(17,25,43,0.15);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand"><img class="mark" src="../brand/logo.png" alt=""> Thermal Guardian</div>
    <span class="kicker">Preventing silent bathroom deaths</span>
    <h1>A wearable safety system built to prevent <span class="accent">19,000</span> silent deaths every year.</h1>
    <div class="footer-line">
      <span>Multi-modal · Stage-aware · Private by design</span>
      <span>ken-toendan.github.io/thermalguardian_w</span>
    </div>
  </div>
</body>
</html>
